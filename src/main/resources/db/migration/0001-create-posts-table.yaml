databaseChangeLog:
  - changeSet:
      id: 0001-create-posts-table
      author: luterel
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: body
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: tags
                  type: varchar(500)
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false