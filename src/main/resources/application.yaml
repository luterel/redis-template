spring:
  application:
    name: redis-template

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s
      repositories:
        enabled: false

  liquibase:
    enabled: true
    change-log: classpath:/db/migration/db.changelog-master.yaml

server:
  port: ${APP_PORT}

cache:
  post:
    redis-ttl: 10m